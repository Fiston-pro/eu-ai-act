<style>
:root{
  --paper:#EEE6D3;--paper2:#F5EFE0;--ink:#1A1410;--ink2:#3A2F25;
  --mute:#6B5C4A;--red:#B83228;--amber:#9A5A1F;--olive:#52612A;
  --rule:#1A14101A;--rule2:#1A141033;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--paper);color:var(--ink);
  font-family:"Poppins",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  font-weight:400;font-size:17px;line-height:1.6;
  -webkit-font-smoothing:antialiased;overflow:hidden;
}
.mono{font-family:"JetBrains Mono",monospace}

/* ---------- HUD ---------- */
.hud{position:fixed;top:0;left:0;right:0;z-index:40;background:rgba(238,230,211,.86);backdrop-filter:saturate(1.4) blur(8px);-webkit-backdrop-filter:saturate(1.4) blur(8px);border-bottom:1px solid var(--rule)}
.hud .track{height:3px}
.hud .track i{display:block;height:100%;width:0;background:var(--red);transition:width .35s cubic-bezier(.2,.7,.2,1)}
.hud .meta{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 16px;max-width:1100px;margin:0 auto}
.brand{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:500;white-space:nowrap}
.brand b{color:var(--red);font-weight:700}
.brand span{color:var(--mute)}
.hudright{display:flex;align-items:center;gap:14px}
.snapchip{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--mute);border:1px solid var(--rule2);border-radius:100px;padding:4px 10px;display:none}
.snapchip.on{display:inline-block}
.snapchip b{color:var(--red)}
.restart{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--mute);background:none;border:none;cursor:pointer;padding:4px}
.restart:hover{color:var(--red)}

/* ---------- stage / cards ---------- */
.stage{height:100dvh;display:flex;flex-direction:column;padding:86px 22px 92px;overflow-y:auto}
.card{width:100%;max-width:640px;margin:auto;opacity:0;transform:translateY(14px);transition:opacity .45s cubic-bezier(.2,.7,.2,1),transform .45s cubic-bezier(.2,.7,.2,1)}
.card.in{opacity:1;transform:none}
.kicker{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute);font-weight:500;display:block;margin-bottom:16px}
.kicker em{color:var(--red);font-style:normal}
.big{font-family:"Fraunces",serif;font-weight:360;font-size:clamp(30px,6.2vw,52px);line-height:1.06;letter-spacing:-.018em;margin-bottom:18px}
.big em{font-style:italic;color:var(--red)}
.big .ok{font-style:italic;color:var(--olive)}
.sub{font-size:clamp(16px,2.2vw,18.5px);color:var(--ink2);max-width:46ch;margin-bottom:10px}
.sub strong{font-weight:600}
.youSaid{display:inline-block;font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.06em;color:var(--mute);border:1px solid var(--rule2);border-radius:100px;padding:5px 12px;margin-bottom:18px}
.youSaid b{color:var(--ink);font-weight:500}
.flagnote{display:inline-flex;align-items:center;gap:7px;font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;border-radius:100px;padding:6px 12px;margin-top:16px}
.flagnote.red{background:#B8322817;color:var(--red)}
.flagnote.amber{background:#9A5A1F17;color:var(--amber)}
.flagnote.green{background:#5261241A;color:var(--olive)}
.storytag{display:inline-block;font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;background:var(--ink);color:var(--paper);padding:5px 11px;margin-bottom:18px}

/* ---------- buttons ---------- */
.btnrow{display:flex;flex-direction:column;gap:10px;margin-top:26px}
.opt{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;text-align:left;background:var(--paper2);border:1px solid var(--rule2);border-radius:4px;padding:16px 18px;font-family:inherit;font-size:16.5px;font-weight:500;color:var(--ink);cursor:pointer;transition:transform .12s,border-color .12s,background .12s}
.opt:hover{border-color:var(--ink);transform:translateY(-1px)}
.opt:active{transform:translateY(0)}
.opt .arr{font-family:"JetBrains Mono",monospace;color:var(--mute);font-size:13px;flex:none}
.opt.picked{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.opt small{display:block;font-size:13px;font-weight:400;color:var(--mute);margin-top:2px}
.opt.picked small{color:#C9B894}
.go{display:inline-flex;align-items:center;gap:10px;background:var(--red);color:#F8F1DD;border:none;cursor:pointer;text-decoration:none;padding:17px 28px;font-family:"JetBrains Mono",monospace;font-size:12.5px;letter-spacing:.18em;text-transform:uppercase;font-weight:500;margin-top:28px;border-radius:3px;transition:transform .15s}
.go:hover{transform:translateY(-2px)}
.go:active{transform:translateY(0)}
.go.ghost{background:transparent;color:var(--ink);border:1px solid var(--ink)}
.go.olive{background:var(--olive)}
.aside{display:block;margin-top:18px;font-family:"JetBrains Mono",monospace;font-size:11.5px;letter-spacing:.06em;color:var(--mute)}
.aside a,.aside button{color:var(--olive);background:none;border:none;border-bottom:1px solid var(--olive);text-decoration:none;cursor:pointer;font:inherit;padding:0}
.aside a:hover,.aside button:hover{color:var(--ink)}

/* ---------- persona fork ---------- */
.fork{display:flex;flex-direction:column;gap:10px;margin-top:24px}
.fork .opt{padding:17px 18px}
.fork .ic{flex:none;width:34px;font-size:20px;text-align:center}

/* ---------- countdown inline ---------- */
.cdrow{display:flex;align-items:baseline;gap:14px;margin:14px 0 6px;flex-wrap:wrap}
.cdrow .n{font-family:"Fraunces",serif;font-weight:300;font-size:clamp(64px,15vw,110px);line-height:.85;color:var(--red);letter-spacing:-.04em}
.cdrow .c{font-family:"Fraunces",serif;font-style:italic;font-size:18px;color:var(--ink2);max-width:18ch}

/* ---------- result ---------- */
.verdict{font-family:"Fraunces",serif;font-weight:380;font-size:clamp(26px,4.6vw,38px);line-height:1.1;letter-spacing:-.014em;margin:4px 0 18px}
.verdict.red{color:var(--red)}.verdict.amber{color:var(--amber)}.verdict.green{color:var(--olive)}
.rolebadge{display:inline-block;font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;background:var(--ink);color:var(--paper);padding:6px 12px;margin-bottom:18px}
.flags{display:flex;flex-direction:column;gap:9px;margin:6px 0 20px}
.flag{display:grid;grid-template-columns:14px 1fr;gap:12px;align-items:start;border:1px solid var(--rule2);border-radius:4px;padding:13px 15px;background:var(--paper2);font-size:15px;line-height:1.45;color:var(--ink2)}
.flag i{width:9px;height:9px;border-radius:50%;margin-top:7px}
.flag.red i{background:var(--red)}.flag.amber i{background:var(--amber)}.flag.green i{background:var(--olive)}
.moves{margin:4px 0 6px;counter-reset:m}
.moves li{counter-increment:m;list-style:none;display:grid;grid-template-columns:40px 1fr;gap:10px;padding:11px 0;border-bottom:1px solid var(--rule);font-size:15.5px;color:var(--ink2)}
.moves li:last-child{border-bottom:none}
.moves li::before{content:counter(m,decimal-leading-zero);font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--red);font-weight:500;padding-top:2px}
.smallprint{font-size:12.5px;color:var(--mute);margin-top:16px;max-width:50ch}

/* ---------- email capture ---------- */
.cap{margin-top:22px;border:1px solid var(--rule2);border-radius:4px;background:var(--paper2);padding:18px}
.cap .t{font-family:"Fraunces",serif;font-size:19px;font-weight:500;margin-bottom:4px}
.cap .d{font-size:14px;color:var(--mute);margin-bottom:12px}
.caprow{display:flex;gap:8px;flex-wrap:wrap}
.caprow input{flex:1;min-width:200px;font-family:inherit;font-size:15px;padding:13px 14px;border:1px solid var(--rule2);border-radius:3px;background:var(--paper);color:var(--ink);outline:none}
.caprow input:focus{border-color:var(--ink)}
.caprow button{background:var(--ink);color:var(--paper);border:none;border-radius:3px;padding:13px 18px;font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;font-weight:500}
.caprow button:hover{background:var(--ink2)}
.capok{display:none;font-size:15px;color:var(--olive);font-weight:500;padding:6px 0}
.cap.done .caprow,.cap.done .d{display:none}
.cap.done .capok{display:block}

/* ---------- resume bar ---------- */
.resume{display:none;margin-top:26px;border:1px dashed var(--rule2);border-radius:4px;padding:13px 16px;font-size:14px;color:var(--ink2);align-items:center;gap:8px;flex-wrap:wrap}
.resume.on{display:flex}
.resume button{background:none;border:none;color:var(--red);font:inherit;font-weight:600;cursor:pointer;border-bottom:1px solid var(--red);padding:0}

/* ---------- toast / back ---------- */
#toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%) translateY(12px);z-index:60;background:var(--ink);color:var(--paper);font-family:"JetBrains Mono",monospace;font-size:12px;padding:11px 16px;border-radius:100px;box-shadow:0 10px 34px rgba(0,0,0,.22);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.backbar{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;justify-content:space-between;align-items:center;padding:12px 18px;background:linear-gradient(to top,var(--paper) 30%,transparent)}
.backbtn{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--mute);background:none;border:none;cursor:pointer;padding:8px;visibility:hidden}
.backbtn.on{visibility:visible}
.backbtn:hover{color:var(--ink)}
.stepcount{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.14em;color:var(--mute)}

@media(prefers-reduced-motion:reduce){
  .card{transition:none}
  .hud .track i{transition:none}
}
</style>

/* ================= STATE ================= */
var state={p:null,i:-1,answers:{},flags:[],score:0,t0:Date.now(),steps:SHARED.slice()};
var stage=document.getElementById("stage");
var progEl=document.getElementById("prog");
var stepcountEl=document.getElementById("stepcount");
var snapchip=document.getElementById("snapchip");
var backBtn=document.getElementById("backBtn");
var SAVE_KEY="eaia_funnel_v1";

function totalSteps(){
  if(!state.p)return 17; /* representative full-journey length pre-fork */
  /* asks from the current step onward will each insert one insight screen */
  var pending=state.steps.slice(state.i).filter(function(s){return s.k==="ask";}).length;
  return state.steps.length+pending;
}
function save(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({p:state.p,i:state.i,answers:state.answers,flags:state.flags,score:state.score,ts:Date.now()}));}catch(e){}}
function clearSave(){try{localStorage.removeItem(SAVE_KEY);}catch(e){}}

function buildSteps(p){
  var per=PERSONAS[p];
  return SHARED.slice(0,3).concat([SHARED[3]],[per.mirror],per.steps,[{k:"result"},{k:"cta"}]);
}

/* ================= RENDER ================= */
function render(push){
  var step=state.steps[state.i];
  if(!step)return;
  var html="";
  if(step.k==="info"){html=tplInfo(step);}
  else if(step.k==="count"){html=tplCount();}
  else if(step.k==="fork"){html=tplFork();}
  else if(step.k==="ask"){html=tplAsk(step);}
  else if(step.k==="insight"){html=tplInsight(step);}
  else if(step.k==="story"){html=tplStory(step);}
  else if(step.k==="result"){html=tplResult();}
  else if(step.k==="cta"){html=tplCta();}

  var card=document.createElement("div");
  card.className="card";card.innerHTML=html;
  stage.innerHTML="";stage.appendChild(card);
  requestAnimationFrame(function(){requestAnimationFrame(function(){card.classList.add("in");});});
  bind(card,step);

  var idx=state.i+1,tot=totalSteps();
  progEl.style.width=Math.min(100,Math.round(idx/tot*100))+"%";
  stepcountEl.textContent=state.p?("Step "+idx+" of "+tot):"";
  backBtn.classList.toggle("on",state.i>0);
  snapchip.classList.toggle("on",state.flags.length>0);
  snapchip.innerHTML="Snapshot: <b>"+state.flags.length+"</b> item"+(state.flags.length===1?"":"s");

  if(push!==false){try{history.pushState({i:state.i,p:state.p},"");}catch(e){}}
  save();
  track("step_viewed",{step_index:state.i,step_kind:step.k,step_id:step.id||step.k});
}

function next(){state.i++;render();}

/* ---------- templates ---------- */
function tplInfo(s){
  var hurry="";
  if(s.extra==="hurry"){
    hurry='<span class="aside">In a hurry? <a href="#" data-act="calaside">Book the free 20-min call directly →</a> &nbsp;·&nbsp; <a href="overview.html" data-act="overview">prefer one page?</a></span>'+
    '<div class="resume" id="resumeBar"><span></span><button type="button" data-act="resume">Continue →</button><button type="button" data-act="startover" style="color:var(--mute);border-color:var(--mute)">start over</button></div>';
  }
  return '<span class="kicker">'+s.kicker+'</span><h1 class="big">'+s.h+'</h1>'+(s.sub?'<p class="sub">'+s.sub+'</p>':"")+'<button class="go" data-act="next">'+(s.btn||"Continue →")+'</button>'+hurry;
}
function tplCount(){
  return '<span class="kicker">Why now</span><h1 class="big">The clock is <em>real</em>.</h1>'+
  '<div class="cdrow"><div class="n">'+daysLeft()+'</div><div class="c">days until 2 Aug 2026, when most duties bite.</div></div>'+
  '<p class="sub">Fines reach <strong>€35M or 7% of revenue</strong>. The bigger cost: finding out late.</p>'+
  '<button class="go" data-act="next">Make it about me →</button>';
}
function tplFork(){
  var btns=Object.keys(PERSONAS).map(function(k){
    var p=PERSONAS[k];
    return '<button class="opt" data-act="persona" data-p="'+k+'"><span style="display:flex;align-items:center;gap:12px"><span class="ic">'+p.ic+'</span><span>'+p.label+'<small>'+p.sub+'</small></span></span><span class="arr">→</span></button>';
  }).join("");
  return '<span class="kicker">Now it gets personal</span><h1 class="big">Which one is <em>you?</em></h1><p class="sub">Pick the closest. Everything after this is written for you.</p><div class="fork">'+btns+'</div>';
}
function tplAsk(s){
  var qn=state.steps.slice(0,state.i+1).filter(function(x){return x.k==="ask";}).length;
  var qt=state.steps.filter(function(x){return x.k==="ask";}).length;
  var opts=s.opts.map(function(o,j){
    return '<button class="opt" data-act="answer" data-j="'+j+'">'+esc(o.t)+(o.sub?'<small>'+esc(o.sub)+'</small>':"")+'<span class="arr">→</span></button>';
  }).join("");
  return '<span class="kicker">Question '+qn+' of '+qt+'</span><h1 class="big" style="font-size:clamp(26px,5vw,42px)">'+esc(s.q)+'</h1>'+(s.sub?'<p class="sub">'+esc(s.sub)+'</p>':"")+'<div class="btnrow">'+opts+'</div>';
}
function tplInsight(s){
  var fl=s.flag?'<br/><span class="flagnote '+s.flag.sev+'">⚑ added to your snapshot</span>':"";
  return '<span class="youSaid">You said: <b>'+esc(s.answered)+'</b></span><h1 class="big">'+s.insight.h+'</h1><p class="sub">'+s.insight.sub+'</p>'+fl+'<br/><button class="go" data-act="next">Continue →</button>';
}
function tplStory(s){
  return '<span class="storytag">'+s.tag+'</span><h1 class="big" style="font-size:clamp(26px,5vw,42px)">'+s.h+'</h1><p class="sub">'+s.sub+'</p><button class="go" data-act="next">'+(s.btn||"Continue →")+'</button>';
}
function levelOf(){
  var reds=state.flags.filter(function(f){return f.sev==="red";}).length;
  if(state.score>=5||reds>=2)return{cls:"red",t:"Act before August 2."};
  if(state.score>=2||reds>=1)return{cls:"amber",t:"Real gaps — very closeable."};
  return{cls:"green",t:"Ahead of the pack. Keep it that way."};
}
function tplResult(){
  var per=PERSONAS[state.p],lv=levelOf();
  var flags=state.flags.map(function(f){return '<div class="flag '+f.sev+'"><i></i><span>'+esc(f.txt)+'</span></div>';}).join("")||'<div class="flag green"><i></i><span>No flags from your answers. Clean snapshot.</span></div>';
  var moves=per.moves.map(function(m){return "<li>"+esc(m)+"</li>";}).join("");
  return '<span class="kicker">Your snapshot · built from your answers</span>'+
  '<span class="rolebadge">Your likely role: '+per.role+'</span>'+
  '<div class="verdict '+lv.cls+'">'+lv.t+'</div>'+
  '<div class="flags">'+flags+'</div>'+
  '<span class="kicker" style="margin-top:8px">Your first three moves</span><ol class="moves">'+moves+'</ol>'+
  '<p class="smallprint">A sketch, not legal advice. '+daysLeft()+' days to do the real version cheaply.</p>'+
  '<button class="go" data-act="next">So what now? →</button>'+
  '<span class="aside"><button type="button" data-act="copysnap">⧉ Copy my snapshot</button></span>';
}
function tplCta(){
  var mref="mailto:"+EMAIL+"?subject="+encodeURIComponent("EU AI Act — a question about my snapshot")+"&body="+encodeURIComponent("Hi Etienne,\n\nMy question:\n\n\n— — — — —\n"+snapshotText());
  return '<span class="kicker">Your next step</span>'+
  '<h1 class="big">20 minutes. Free. About <em>your</em> answers.</h1>'+
  '<p class="sub">I’ll have your snapshot in front of me — what’s urgent, what’s noise, what to do first. Can’t help? I’ll say so in minute five.</p>'+
  '<button class="go" data-act="book" data-cal-namespace="review" data-cal-link="'+CAL_LINK+'" data-cal-config=\'{"layout":"month_view"}\'>Book the free call →</button>'+
  '<p class="sub" style="margin-top:26px">Rather not call? <strong>Just write to me.</strong> Your snapshot is already in the email — add your question and hit send.</p>'+
  '<a class="go ghost" data-act="writeme" href="'+mref+'">Email me →</a>'+
  '<span class="aside"><button type="button" data-act="copysnap">⧉ Copy my snapshot</button> &nbsp;·&nbsp; <button type="button" data-act="other">try another path</button> &nbsp;·&nbsp; <a href="overview.html" data-act="overview">one-page version</a></span>';
}

/* ---------- snapshot text ---------- */
function snapshotText(){
  var per=PERSONAS[state.p],lv=levelOf();
  var L=[];
  L.push("MY EU AI ACT SNAPSHOT — "+per.label);
  L.push("Verdict: "+lv.t+" ("+daysLeft()+" days to 2 Aug 2026)");
  L.push("Likely role: "+per.role);L.push("");
  L.push("Flags:");state.flags.forEach(function(f){L.push(" ["+f.sev.toUpperCase()+"] "+f.txt);});
  L.push("");L.push("First three moves:");per.moves.forEach(function(m,i){L.push(" "+(i+1)+". "+m);});
  L.push("");L.push("Free 20-min review: https://cal.com/"+CAL_LINK);
  L.push("Etienne Byiringiro · "+EMAIL+" · ishi-eu-ai-act.vercel.app");
  return L.join("\n");
}

/* ================= EVENTS ================= */
function bind(card,step){
  card.addEventListener("click",function(e){
    var el=e.target.closest("[data-act]");if(!el)return;
    var act=el.getAttribute("data-act");
    if(act==="next"){next();}
    else if(act==="persona"){
      var p=el.getAttribute("data-p");
      state.p=p;state.steps=buildSteps(p);state.i=4; /* mirror index */
      track("persona_selected",{choice:p});render();
    }
    else if(act==="answer"){
      e.preventDefault();
      var j=+el.getAttribute("data-j"),o=step.opts[j];
      el.classList.add("picked");
      state.answers[step.id]=o.t;
      if(o.flag&&!state.flags.some(function(f){return f.txt===o.flag.txt;})){state.flags.push(o.flag);}
      state.score+=o.score||0;
      track("answer_given",{question_id:step.id,answer:o.t,score:o.score||0});
      var ins={k:"insight",insight:o.insight,flag:o.flag,answered:o.t,id:step.id+"_insight"};
      state.steps.splice(state.i+1,0,ins);
      setTimeout(next,260);
    }
    else if(act==="book"){
      track("book_clicked",{from:"cta",score:state.score});
      /* Cal popup attaches via data-cal-link attrs; nothing else to do */
    }
    else if(act==="calaside"){
      e.preventDefault();track("book_clicked",{from:"hook"});
      var b=document.createElement("button");
      b.setAttribute("data-cal-namespace","review");b.setAttribute("data-cal-link",CAL_LINK);b.setAttribute("data-cal-config",'{"layout":"month_view"}');
      b.style.display="none";document.body.appendChild(b);b.click();setTimeout(function(){b.remove();},800);
    }
    else if(act==="writeme"){copyText(EMAIL);toast("✓ "+EMAIL+" copied — opening your mail app…");track("email_clicked",{from:"cta"});}
    else if(act==="copysnap"){copyText(snapshotText());toast("✓ Snapshot copied — paste it anywhere");track("snapshot_copied",{});}
    else if(act==="mailme"){copyText(EMAIL);toast("✓ "+EMAIL+" copied");track("email_clicked",{});}
    else if(act==="other"){track("restart",{kind:"another_path"});resetTo(3);}
    else if(act==="overview"){track("overview_clicked",{});}
    else if(act==="resume"){var s=pendingResume;if(s){state.p=s.p;state.steps=buildSteps(s.p);state.i=s.i;state.answers=s.answers||{};state.flags=s.flags||[];state.score=s.score||0;track("resumed",{at:s.i});render();}}
    else if(act==="startover"){clearSave();document.getElementById("resumeBar").classList.remove("on");toast("Fresh start ✓");}
  });
  if(step.k==="result"){track("result_viewed",{verdict:levelOf().cls,score:state.score,flags:state.flags.length,duration_s:Math.round((Date.now()-state.t0)/1000)});}
  if(step.k==="cta"){track("cta_viewed",{verdict:levelOf().cls});}
}

function resetTo(i){state.p=null;state.steps=SHARED.slice();state.i=i;state.answers={};state.flags=[];state.score=0;render();}

document.getElementById("restartBtn").addEventListener("click",function(){track("restart",{kind:"full"});clearSave();state.t0=Date.now();resetTo(0);});
backBtn.addEventListener("click",function(){if(state.i>0){state.i--;render(false);}});
window.addEventListener("popstate",function(e){if(e.state&&typeof e.state.i==="number"){if(e.state.p&&e.state.p!==state.p){state.p=e.state.p;state.steps=buildSteps(e.state.p);}else if(!e.state.p){state.p=null;state.steps=SHARED.slice();}state.i=e.state.i;render(false);}});
document.addEventListener("keydown",function(e){
  if(e.key==="Enter"){var g=stage.querySelector(".go[data-act='next']");if(g){g.click();}}
  if(e.key>="1"&&e.key<="5"){var os=stage.querySelectorAll(".opt");var k=+e.key-1;if(os[k]){os[k].click();}}
});

/* ================= BOOT ================= */
var pendingResume=null;
try{
  var saved=JSON.parse(localStorage.getItem(SAVE_KEY)||"null");
  if(saved&&saved.p&&saved.i>4&&(Date.now()-saved.ts)<7*86400000){pendingResume=saved;}
}catch(e){}
track("funnel_start",{returning:!!pendingResume});
state.i=0;render(false);
try{history.replaceState({i:0,p:null},"");}catch(e){}
if(pendingResume){
  var bar=document.getElementById("resumeBar");
  if(bar){bar.classList.add("on");bar.querySelector("span").textContent="Welcome back — you were on step "+(pendingResume.i+1)+" of the "+PERSONAS[pendingResume.p].label+" path.";}
}
})();
</script>
</body>
</html>
