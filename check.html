  html+='<p class="sub" style="margin-top:14px">Want me to do this for you? Grab a free 20 minute call and I’ll tell you what is urgent and what can wait.</p>';
  html+='<a class="go book" href="#book" data-subject="Free 20-minute EU AI Act call">Book the free call</a>';
  html+='<a class="go ghost" href="mailto:'+EMAIL+'?subject='+encodeURIComponent("EU AI Act, my short list")+'" data-act="mail">Email me instead</a>';
  return html;
}

function bind(card,s){
  card.addEventListener("click",function(e){
    var el=e.target.closest("[data-act]");if(!el)return;var a=el.getAttribute("data-act");
    if(a==="next"){next();}
    else if(a==="ind"){state.industry=el.getAttribute("data-k");track("industry_selected",{choice:state.industry});next();}
    else if(a==="ans"){var j=+el.getAttribute("data-j"),op=s.opts[j];state.ans[s.id]=op.v;if(op.flag&&state.flags.indexOf(op.flag)<0)state.flags.push(op.flag);track("answer",{q:s.id,a:op.v});next();}
    else if(a==="mail"){track("email_clicked",{});}
  });
  if(s.k==="result")track("result_viewed",{audit:(state.ans.people==="yes"||state.ans.people==="unsure")});
  // booking buttons
  card.querySelectorAll(".book").forEach(function(b){
    b.setAttribute("data-cal-namespace","review");b.setAttribute("data-cal-link",CAL_LINK);b.setAttribute("data-cal-config",'{"layout":"month_view"}');
    b.addEventListener("click",function(){track("book_clicked",{at:s.k});});
  });
}

document.getElementById("restartBtn").addEventListener("click",function(){track("restart",{});state.i=0;state.industry=null;state.ans={};state.flags=[];render();});
backBtn.addEventListener("click",back);
window.addEventListener("popstate",function(e){if(e.state&&typeof e.state.i==="number"){state.i=e.state.i;render(false);}});
document.addEventListener("keydown",function(e){if(e.key==="Enter"){var g=stage.querySelector(".go[data-act='next']");if(g)g.click();}});

track("flow_start",{});
render(false);
try{history.replaceState({i:0},"");}catch(e){}
})();
</script>
</body>
