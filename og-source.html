<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="robots" content="noindex"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--paper:#EEE6D3;--ink:#1A1410;--red:#B83228;--mute:#6B5C4A}
html,body{width:1200px;height:630px}
body{background:var(--paper);overflow:hidden}
.wrap{position:relative;width:1200px;height:630px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 90px}
.h{font-family:"Fraunces",Georgia,serif;font-weight:340;font-size:72px;line-height:1.05;letter-spacing:-.02em;color:var(--ink)}
.h .r{color:var(--red)}
.a{font-family:"Fraunces",Georgia,serif;font-style:italic;font-weight:400;font-size:54px;color:var(--red);margin-top:34px}
.b{font-family:"Fraunces",Georgia,serif;font-weight:340;font-size:30px;color:var(--ink);margin-top:12px}
.url{position:absolute;bottom:46px;left:0;right:0;text-align:center;font-family:"JetBrains Mono",monospace;font-size:17px;letter-spacing:.08em;color:var(--mute)}
</style>
</head>
<body>
<div class="wrap">
  <div class="h">Who has time to read<br/>the <span class="r">EU AI Act?</span></div>
  <div class="a">We do.</div>
  <div class="b">So you don't have to.</div>
  <div class="url">ishi-eu-ai-act.vercel.app</div>
</div>
</body>
</html>
